<!DOCTYPE html>
<html lang="es"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stock Scanner — Flexxus</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
<link href="Stock%20Scanner%20%E2%80%94%20Flexxus%20V2_files/css2.css" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.07);
    --border-hi: rgba(255,255,255,0.15);
    --accent: #00e5a0;
    --accent-dim: rgba(0,229,160,0.12);
    --accent-glow: rgba(0,229,160,0.3);
    --warn: #ff6b35;
    --warn-dim: rgba(255,107,53,0.12);
    --text: #f0f0f5;
    --text-2: #8888a0;
    --text-3: #44445a;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 80px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .wrap { position: relative; z-index: 1; width: 100%; max-width: 480px; }

  header { padding: 28px 0 20px; text-align: center; }
  .logo-mark { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .logo-icon {
    width: 32px; height: 32px;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .logo-icon svg { width: 16px; height: 16px; }
  .logo-text { font-size: 13px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--text-2); }
  h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
  h1 span { color: var(--accent); }
  .subtitle { font-size: 13px; color: var(--text-2); margin-top: 6px; }

  /* Config */
  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
  }
  .config-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
  .field { flex: 1; min-width: 100px; }
  .field label {
    display: block;
    font-size: 10px; font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--text-3); margin-bottom: 5px;
    font-family: var(--mono);
  }
  .field input, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  .field select option { background: #1a1a24; }
  .btn-connect {
    background: var(--accent); color: #000;
    border: none; border-radius: 8px;
    font-family: var(--sans); font-size: 13px; font-weight: 700;
    padding: 8px 16px; cursor: pointer; white-space: nowrap;
    transition: opacity .15s, transform .1s; letter-spacing: .03em;
  }
  .btn-connect:hover { opacity: .88; }
  .btn-connect:active { transform: scale(.97); }
  .btn-connect:disabled { opacity: .35; cursor: not-allowed; }
  .status-bar {
    display: flex; align-items: center; gap: 7px;
    margin-top: 12px; font-size: 12px; color: var(--text-2); font-family: var(--mono);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-3); flex-shrink: 0; transition: background .3s;
  }
  .dot.ok  { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .dot.err { background: var(--warn);   box-shadow: 0 0 6px var(--warn); }
  .dot.loading { background: #f5c542; animation: blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* Scanner card */
  .scanner-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
    transition: border-color .3s;
  }
  .scanner-card.cam-active { border-color: var(--accent); }

  /* Text input row */
  .scan-input-wrap { position: relative; margin-bottom: 12px; }
  .scan-icon {
    position: absolute; left: 13px; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px; color: var(--text-3); pointer-events: none;
  }
  #barcodeInput {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text); font-family: var(--mono);
    font-size: 16px; font-weight: 500;
    padding: 12px 12px 12px 42px;
    outline: none; letter-spacing: .04em;
    transition: border-color .2s, box-shadow .2s;
  }
  #barcodeInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  #barcodeInput::placeholder { color: var(--text-3); font-size: 13px; letter-spacing: 0; }

  /* Camera button */
  .cam-btn-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .btn-cam {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text); font-family: var(--sans); font-size: 14px; font-weight: 700;
    padding: 12px;
    cursor: pointer; transition: border-color .2s, background .2s;
  }
  .btn-cam:hover { border-color: var(--accent); background: var(--accent-dim); }
  .btn-cam.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
  .btn-cam svg { width: 20px; height: 20px; flex-shrink: 0; }

  .btn-stop {
    background: var(--warn-dim);
    border: 1.5px solid rgba(255,107,53,0.3);
    border-radius: 10px;
    color: var(--warn); font-family: var(--sans); font-size: 13px; font-weight: 700;
    padding: 12px 16px; cursor: pointer;
    transition: background .2s;
  }
  .btn-stop:hover { background: rgba(255,107,53,0.2); }

  /* Camera viewfinder */
  .cam-wrap {
    position: relative;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    margin-bottom: 10px;
    aspect-ratio: 4/3;
  }
  #camVideo {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  /* Scanning overlay */
  .cam-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .cam-frame {
    width: 75%; max-width: 260px;
    aspect-ratio: 3/1;
    position: relative;
  }
  .cam-frame::before, .cam-frame::after,
  .cam-frame-inner::before, .cam-frame-inner::after {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    border-color: var(--accent);
    border-style: solid;
  }
  .cam-frame::before  { top: 0;    left: 0;  border-width: 2px 0 0 2px; }
  .cam-frame::after   { top: 0;    right: 0; border-width: 2px 2px 0 0; }
  .cam-frame-inner::before { bottom: 0; left: 0;  border-width: 0 0 2px 2px; }
  .cam-frame-inner::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
  .cam-laser {
    position: absolute;
    left: 10%; right: 10%;
    top: 50%; height: 1.5px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent), 0 0 20px var(--accent-glow);
    animation: laser 2s ease-in-out infinite;
  }
  @keyframes laser {
    0%,100% { top: 20%; opacity: .6; }
    50%      { top: 80%; opacity: 1; }
  }
  .cam-status {
    position: absolute; bottom: 10px; left: 0; right: 0;
    text-align: center;
    font-size: 11px; font-family: var(--mono);
    color: rgba(255,255,255,.7);
    text-shadow: 0 1px 4px rgba(0,0,0,.8);
  }
  .cam-flash {
    position: absolute; inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    transition: opacity .1s;
  }
  .cam-flash.flash { opacity: .35; }

  .scan-hint { font-size: 11px; color: var(--text-3); font-family: var(--mono); text-align: center; }
  .scan-hint kbd {
    display: inline-block; border: 1px solid var(--border-hi);
    border-radius: 4px; padding: 1px 5px;
    font-family: var(--mono); font-size: 10px; color: var(--text-2);
  }

  /* Result */
  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px; margin-bottom: 12px;
    animation: slideUp .25s ease-out;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .article-code { font-family: var(--mono); font-size: 11px; color: var(--text-3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px; }
  .article-name { font-size: 17px; font-weight: 700; line-height: 1.3; margin-bottom: 14px; }
  .stock-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .stock-cell {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
  }
  .stock-cell.highlight { background: var(--accent-dim); border-color: rgba(0,229,160,0.25); }
  .stock-cell.low       { background: var(--warn-dim);   border-color: rgba(255,107,53,0.25); }
  .stock-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); font-family: var(--mono); margin-bottom: 4px; }
  .stock-val   { font-size: 26px; font-weight: 800; line-height: 1; font-family: var(--mono); }
  .stock-cell.highlight .stock-val { color: var(--accent); }
  .stock-cell.low       .stock-val { color: var(--warn); }
  .article-meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .meta-pill {
    font-size: 11px; font-family: var(--mono);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px; color: var(--text-2);
  }

  /* Error */
  .msg-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; text-align: center;
    margin-bottom: 12px; animation: slideUp .25s ease-out;
  }
  .msg-card.err { border-color: rgba(255,107,53,0.3); }
  .msg-icon  { font-size: 30px; margin-bottom: 10px; }
  .msg-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .msg-card.err .msg-title { color: var(--warn); }
  .msg-sub   { font-size: 13px; color: var(--text-2); font-family: var(--mono); }

  /* Skeleton */
  .skeleton { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
  .skel-line { height: 11px; background: linear-gradient(90deg,var(--surface2) 25%,var(--surface) 50%,var(--surface2) 75%); background-size: 200% 100%; border-radius: 6px; animation: shimmer 1.4s infinite; margin-bottom: 9px; }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .skel-line.w60 { width: 60%; } .skel-line.w40 { width: 40%; }
  .skel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .skel-cell { height: 70px; background: var(--surface2); border-radius: 10px; animation: shimmer 1.4s infinite; }

  /* History */
  .history-title { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text-3); font-family: var(--mono); margin-bottom: 8px; }
  .history-list  { display: flex; flex-direction: column; gap: 6px; }
  .history-item  {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    cursor: pointer; transition: border-color .15s, background .15s;
  }
  .history-item:hover { border-color: var(--border-hi); background: var(--surface2); }
  .history-barcode { font-family: var(--mono); font-size: 12px; color: var(--text-2); flex: 1; }
  .history-name    { font-size: 12px; color: var(--text); flex: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-stock   { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--accent); min-width: 32px; text-align: right; }
  .history-stock.low { color: var(--warn); }

  #app { width: 100%; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo-mark">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="2" height="12" fill="#00e5a0"></rect><rect x="5" y="2" width="1" height="12" fill="#00e5a0"></rect><rect x="7" y="2" width="2" height="12" fill="#00e5a0"></rect><rect x="10" y="2" width="1" height="12" fill="#00e5a0"></rect><rect x="12" y="2" width="2" height="12" fill="#00e5a0"></rect></svg>
      </div>
      <span class="logo-text">Flexxus API</span>
    </div>
    <h1>Stock <span>Scanner</span></h1>
    <p class="subtitle">Consultá stock en tiempo real por código de barras</p>
  </header>
  <div id="app"><div class="config-panel">
    <div class="config-row">
      <div class="field" style="min-width:90px;flex:0.8">
        <label>Usuario</label>
        <input id="cfgUser" value="MAXIMG" autocomplete="off">
      </div>
      <div class="field" style="min-width:90px;flex:0.8">
        <label>Contraseña</label>
        <input id="cfgPass" type="password" value="MAXIMG">
      </div>
      <div class="field" style="flex:1.4">
        <label>Depósito</label>
        <select id="cfgDeposit">
          <option value="001" selected="selected">URQUIZA</option><option value="002">GALICIA</option><option value="003">DEV. URQUIZA</option><option value="004">DEV. GALICIA</option><option value="005">MAYORISTA</option><option value="006">VAMOS RAPIDO</option><option value="007">MERCADO LIBRE</option><option value="008">GALPÓN SIRIA</option>
        </select>
      </div>
      <button class="btn-connect" id="btnConnect">
        ↺
      </button>
    </div>
    <div class="status-bar">
      <span class="dot ok"></span>
      <span>Conectado · 8 depósito(s)</span>
    </div></div><div class="scanner-card" id="scannerCard">
    <div class="scan-input-wrap">
      <svg class="scan-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="5" width="3" height="14" rx="1"></rect>
        <rect x="7.5" y="5" width="1.5" height="14" rx="0.5"></rect>
        <rect x="10.5" y="5" width="2.5" height="14" rx="0.5"></rect>
        <rect x="14.5" y="5" width="1.5" height="14" rx="0.5"></rect>
        <rect x="17.5" y="5" width="3" height="14" rx="1"></rect>
      </svg>
      <input id="barcodeInput" type="text" placeholder="Escribí o escaneá el código…" autocomplete="off" autocorrect="off" spellcheck="false" inputmode="numeric">
    </div>

    <div class="cam-btn-row">
      <button class="btn-cam " id="btnCam">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
          <circle cx="12" cy="13" r="4"></circle>
        </svg>
        Usar cámara
      </button>
      
    </div>

    <div id="camContainer" style="display:none">
      <div class="cam-wrap">
        <video id="camVideo" playsinline="" muted="muted"></video>
        <div class="cam-overlay">
          <div class="cam-frame">
            <div class="cam-frame-inner"></div>
            <div class="cam-laser"></div>
          </div>
        </div>
        <div class="cam-flash" id="camFlash"></div>
        <div class="cam-status" id="camStatus">Apuntá al código de barras</div>
      </div>
    </div>

    <p class="scan-hint" id="scanHint">
      Presioná la cámara o <kbd>Enter</kbd> para buscar
    </p></div></div>
</div>

<!-- ZXing barcode library -->
<script src="Stock%20Scanner%20%E2%80%94%20Flexxus%20V2_files/index.min.js"></script>

<script>
const API_BASE = 'https://brufau.procomisp.com.ar';
const DEVICE   = '{"model":"0","platform":"0","uuid":"4953457348957348975","version":"0","manufacturer":"0"}';

let token     = null;
let deposits  = [];
let history   = [];
let codeReader = null;
let camActive  = false;
let camStream  = null;

// ── render ───────────────────────────────────────────────────────────────────
function render(state) {
  const app = document.getElementById('app');
  // Save cam state before wipe
  const wasActive = camActive;
  app.innerHTML = '';
  app.appendChild(configPanel(state));
  if (state.connected) app.appendChild(scannerPanel(state, wasActive));
  if (state.searching)       app.appendChild(skeletonCard());
  else if (state.result)     app.appendChild(resultCard(state.result, state.selectedDeposit));
  else if (state.error)      app.appendChild(errorCard(state.error));
  if (history.length > 0 && !state.searching) app.appendChild(historyPanel(state));
}

// ── Config panel ─────────────────────────────────────────────────────────────
function configPanel(state) {
  const div = document.createElement('div');
  div.className = 'config-panel';
  div.innerHTML = `
    <div class="config-row">
      <div class="field" style="min-width:90px;flex:0.8">
        <label>Usuario</label>
        <input id="cfgUser" value="${state.user||'MAXIMG'}" autocomplete="off" />
      </div>
      <div class="field" style="min-width:90px;flex:0.8">
        <label>Contraseña</label>
        <input id="cfgPass" type="password" value="${state.pass||'MAXIMG'}" />
      </div>
      <div class="field" style="flex:1.4">
        <label>Depósito</label>
        <select id="cfgDeposit">
          ${state.connected && deposits.length
            ? deposits.map(d=>`<option value="${d.codigodeposito}" ${d.codigodeposito===state.selectedDeposit?'selected':''}>${d.descripcion}</option>`).join('')
            : `<option value="">${state.connected?'Sin depósitos':'— conectar —'}</option>`}
        </select>
      </div>
      <button class="btn-connect" id="btnConnect" ${state.connecting?'disabled':''}>
        ${state.connecting?'…':state.connected?'↺':'Conectar'}
      </button>
    </div>
    <div class="status-bar">
      <span class="dot ${state.connected?'ok':state.connecting?'loading':state.authError?'err':''}"></span>
      <span>${state.connected
        ? `Conectado · ${deposits.length} depósito(s)`
        : state.connecting ? 'Autenticando…'
        : state.authError  ? state.authError
        : 'Sin conexión'}</span>
    </div>`;
  div.querySelector('#btnConnect').onclick = () =>
    doConnect(div.querySelector('#cfgUser').value.trim(), div.querySelector('#cfgPass').value.trim());
  return div;
}

// ── Scanner panel ────────────────────────────────────────────────────────────
function scannerPanel(state, keepCam) {
  const div = document.createElement('div');
  div.className = 'scanner-card' + (keepCam ? ' cam-active' : '');
  div.id = 'scannerCard';

  div.innerHTML = `
    <div class="scan-input-wrap">
      <svg class="scan-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="5" width="3" height="14" rx="1"/>
        <rect x="7.5" y="5" width="1.5" height="14" rx="0.5"/>
        <rect x="10.5" y="5" width="2.5" height="14" rx="0.5"/>
        <rect x="14.5" y="5" width="1.5" height="14" rx="0.5"/>
        <rect x="17.5" y="5" width="3" height="14" rx="1"/>
      </svg>
      <input id="barcodeInput" type="text"
        placeholder="Escribí o escaneá el código…"
        value="${state.barcode||''}"
        autocomplete="off" autocorrect="off" spellcheck="false" inputmode="numeric" />
    </div>

    <div class="cam-btn-row">
      <button class="btn-cam ${keepCam?'active':''}" id="btnCam">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        ${keepCam ? 'Cámara activa' : 'Usar cámara'}
      </button>
      ${keepCam ? `<button class="btn-stop" id="btnStop">Detener</button>` : ''}
    </div>

    <div id="camContainer" style="display:${keepCam?'block':'none'}">
      <div class="cam-wrap">
        <video id="camVideo" playsinline muted></video>
        <div class="cam-overlay">
          <div class="cam-frame">
            <div class="cam-frame-inner"></div>
            <div class="cam-laser"></div>
          </div>
        </div>
        <div class="cam-flash" id="camFlash"></div>
        <div class="cam-status" id="camStatus">Apuntá al código de barras</div>
      </div>
    </div>

    <p class="scan-hint" id="scanHint">
      ${keepCam ? 'Encuadrá el código en el área verde' : 'Presioná la cámara o <kbd>Enter</kbd> para buscar'}
    </p>`;

  // Text input logic
  const inp = div.querySelector('#barcodeInput');
  if (!keepCam) { setTimeout(()=>inp.focus(), 50); }
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const v = inp.value.trim();
      if (v) triggerSearch(v);
    }
  });
  // Hardware scanner (rapid paste)
  let scanTimer = null;
  inp.addEventListener('input', () => {
    clearTimeout(scanTimer);
    scanTimer = setTimeout(() => {
      if (inp.value.trim().length >= 4) triggerSearch(inp.value.trim());
    }, 120);
  });

  // Camera button
  div.querySelector('#btnCam').onclick = () => startCamera(div);
  if (keepCam) {
    div.querySelector('#btnStop').onclick = () => stopCamera();
    // Re-attach stream if still alive
    setTimeout(() => {
      const vid = document.getElementById('camVideo');
      if (vid && camStream) { vid.srcObject = camStream; vid.play(); }
    }, 50);
  }

  return div;
}

// ── Camera logic ─────────────────────────────────────────────────────────────
async function startCamera(scannerDiv) {
  if (camActive) return;

  // Show container
  const container = scannerDiv.querySelector('#camContainer');
  container.style.display = 'block';
  scannerDiv.classList.add('cam-active');
  scannerDiv.querySelector('#btnCam').classList.add('active');
  scannerDiv.querySelector('#btnCam').textContent = 'Cámara activa';
  scannerDiv.querySelector('#scanHint').innerHTML = 'Encuadrá el código en el área verde';

  // Add stop button
  if (!scannerDiv.querySelector('#btnStop')) {
    const stopBtn = document.createElement('button');
    stopBtn.className = 'btn-stop'; stopBtn.id = 'btnStop';
    stopBtn.textContent = 'Detener';
    stopBtn.onclick = () => stopCamera();
    scannerDiv.querySelector('.cam-btn-row').appendChild(stopBtn);
  }

  camActive = true;

  try {
    // Request camera
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('camVideo');
    if (!video) { stopCamera(); return; }
    video.srcObject = camStream;
    await video.play();

    // Start ZXing decoder
    if (typeof ZXing === 'undefined') {
      document.getElementById('camStatus').textContent = 'Error: librería no cargada';
      return;
    }
    const hints = new Map();
    const formats = [
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.ITF,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.UPC_E,
      ZXing.BarcodeFormat.QR_CODE,
    ];
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

    codeReader = new ZXing.BrowserMultiFormatReader(hints);

    let lastResult = null;
    let cooldown   = false;

    codeReader.decodeFromVideoElement(video, (result, err) => {
      if (!camActive) return;
      if (result && !cooldown) {
        const code = result.getText();
        if (code === lastResult) return;
        lastResult = code;
        cooldown   = true;

        // Flash effect
        const flash = document.getElementById('camFlash');
        if (flash) { flash.classList.add('flash'); setTimeout(()=>flash.classList.remove('flash'), 150); }

        // Populate input
        const inp = document.getElementById('barcodeInput');
        if (inp) inp.value = code;

        // Vibrate on mobile
        if (navigator.vibrate) navigator.vibrate(60);

        // Search
        triggerSearch(code);

        // Stop camera after successful scan
        setTimeout(() => { stopCamera(); cooldown = false; }, 800);
      }
      if (err && !(err instanceof ZXing.NotFoundException)) {
        // Ignore not-found errors (normal during scanning)
      }
    });

    document.getElementById('camStatus').textContent = 'Apuntá al código de barras';

  } catch(e) {
    camActive = false;
    const status = document.getElementById('camStatus');
    if (status) status.textContent = `Sin acceso a cámara: ${e.message}`;
    const card = document.getElementById('scannerCard');
    if (card) card.classList.remove('cam-active');
  }
}

function stopCamera() {
  camActive = false;
  if (codeReader) { try { codeReader.reset(); } catch(_){} codeReader = null; }
  if (camStream)  { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  const container = document.getElementById('camContainer');
  if (container) container.style.display = 'none';
  const card = document.getElementById('scannerCard');
  if (card) card.classList.remove('cam-active');
  const btnCam = document.getElementById('btnCam');
  if (btnCam) { btnCam.classList.remove('active'); btnCam.textContent = 'Usar cámara'; }
  const btnStop = document.getElementById('btnStop');
  if (btnStop) btnStop.remove();
  const hint = document.getElementById('scanHint');
  if (hint) hint.innerHTML = 'Presioná la cámara o <kbd>Enter</kbd> para buscar';
  const inp = document.getElementById('barcodeInput');
  if (inp) { setTimeout(()=>inp.focus(), 50); }
}

// ── Search trigger ────────────────────────────────────────────────────────────
function triggerSearch(barcode) {
  const dep = document.querySelector('#cfgDeposit')?.value || appState.selectedDeposit;
  appState.selectedDeposit = dep;
  doSearch(barcode, dep);
}

// ── Result cards ─────────────────────────────────────────────────────────────
function resultCard(article, depositCode) {
  const dep     = deposits.find(d => d.codigodeposito === depositCode);
  const depName = dep ? dep.descripcion : depositCode || 'Todos';
  const rem  = article.STOCKREMANENTE  ?? article.stockremanente  ?? 0;
  const real = article.STOCKREAL       ?? article.stockreal       ?? 0;
  const disp = article.STOCKDISPONIBLE ?? article.stockdisponible ?? 0;
  const np   = article.NPRESERVADA     ?? article.npreservada     ?? 0;
  const low  = rem <= 0;
  const div  = document.createElement('div');
  div.className = 'result-card';
  div.innerHTML = `
    <div class="article-code">${article.CODIGOARTICULO||article.codigoarticulo} · ${article.CODIGOPARTICULAR||article.codigoparticular||'—'}</div>
    <div class="article-name">${article.descripcion||article.DESCRIPCION||'—'}</div>
    <div class="stock-grid">
      <div class="stock-cell highlight">
        <div class="stock-label">Remanente</div>
        <div class="stock-val">${rem}</div>
      </div>
      <div class="stock-cell ${low?'low':''}">
        <div class="stock-label">Disponible</div>
        <div class="stock-val">${disp}</div>
      </div>
      <div class="stock-cell">
        <div class="stock-label">Stock real</div>
        <div class="stock-val">${real}</div>
      </div>
      <div class="stock-cell">
        <div class="stock-label">NP reservado</div>
        <div class="stock-val">${np}</div>
      </div>
    </div>
    <div class="article-meta">
      <span class="meta-pill">📍 ${depName}</span>
      ${article.unidadMedida?`<span class="meta-pill">UM: ${article.unidadMedida.codigounidadmedida}</span>`:''}
      ${article.rubro ?`<span class="meta-pill">${article.rubro.descripcion}</span>`:''}
      ${article.marca ?`<span class="meta-pill">${article.marca.descripcion}</span>`:''}
      <span class="meta-pill" style="margin-left:auto;color:var(--text-3);font-size:10px">${new Date().toLocaleTimeString('es-AR')}</span>
    </div>`;
  return div;
}

function errorCard(msg) {
  const div = document.createElement('div');
  div.className = 'msg-card err';
  div.innerHTML = `<div class="msg-icon">⚠</div><div class="msg-title">No se encontró</div><div class="msg-sub">${msg}</div>`;
  return div;
}

function skeletonCard() {
  const div = document.createElement('div');
  div.className = 'skeleton';
  div.innerHTML = `<div class="skel-line w40"></div><div class="skel-line w60"></div><div class="skel-grid"><div class="skel-cell"></div><div class="skel-cell"></div><div class="skel-cell"></div><div class="skel-cell"></div></div>`;
  return div;
}

function historyPanel(state) {
  const div = document.createElement('div');
  div.innerHTML = `<div class="history-title">Últimas búsquedas</div>`;
  const list = document.createElement('div');
  list.className = 'history-list';
  history.slice().reverse().slice(0, 5).forEach(h => {
    const item = document.createElement('div');
    item.className = 'history-item';
    const rem = h.result?.STOCKREMANENTE ?? h.result?.stockremanente ?? '—';
    const low = typeof rem === 'number' && rem <= 0;
    item.innerHTML = `
      <span class="history-barcode">${h.barcode}</span>
      <span class="history-name">${h.result?.descripcion||h.result?.DESCRIPCION||'No encontrado'}</span>
      <span class="history-stock ${low?'low':''}">${rem}</span>`;
    item.onclick = () => { appState.barcode=h.barcode; appState.result=h.result; appState.error=h.error; render(appState); };
    list.appendChild(item);
  });
  div.appendChild(list);
  return div;
}

// ── API ───────────────────────────────────────────────────────────────────────
async function doConnect(user, pass) {
  appState.connecting = true; appState.authError = null; appState.connected = false;
  render(appState);
  try {
    const form = new URLSearchParams();
    form.append('username', user); form.append('password', pass); form.append('deviceinfo', DEVICE);
    const res  = await fetch(`${API_BASE}/v5/auth/login`, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: form });
    const data = await res.json();
    if (!res.ok || !data.token) throw new Error(data.message || `HTTP ${res.status}`);
    token = data.token;
    appState.user = user; appState.pass = pass;
    appState.connected = true; appState.connecting = false;
    await loadDeposits();
  } catch(e) {
    appState.connecting = false; appState.authError = `Error: ${e.message}`;
    render(appState);
  }
}

async function loadDeposits() {
  try {
    const res  = await fetch(`${API_BASE}/v5/depositos`, { headers:{'Authorization':`Bearer ${token}`} });
    const data = await res.json();
    deposits = Array.isArray(data) ? data : (data.data || []);
    appState.selectedDeposit = deposits[0]?.codigodeposito || '';
  } catch(e) { deposits = []; }
  render(appState);
}

async function doSearch(barcode, depositCode) {
  appState.barcode = barcode; appState.searching = true;
  appState.result = null; appState.error = null;
  render(appState);
  try {
    // 1. Find article by barcode
    let artRes = await fetch(`${API_BASE}/v5/articulos?codigobarra=${encodeURIComponent(barcode)}&limit=1`, { headers:{'Authorization':`Bearer ${token}`} });
    let artData = await artRes.json();
    let articles = Array.isArray(artData) ? artData : (artData.data || []);

    if (!articles.length) {
      artRes  = await fetch(`${API_BASE}/v5/articulos?codigoarticulo=${encodeURIComponent(barcode)}&limit=1`, { headers:{'Authorization':`Bearer ${token}`} });
      artData = await artRes.json();
      articles = Array.isArray(artData) ? artData : (artData.data || []);
      if (!articles.length) throw new Error(`Código "${barcode}" no encontrado`);
    }

    const article      = articles[0];
    const codigoInterno = article.codigoarticulo || article.CODIGOARTICULO;

    // 2. Get stock
    let stockUrl = `${API_BASE}/v5/stock?codigoarticulo=${encodeURIComponent(codigoInterno)}`;
    if (depositCode) stockUrl += `&codigosdepositos=${encodeURIComponent(depositCode)}`;
    const stockRes  = await fetch(stockUrl, { headers:{'Authorization':`Bearer ${token}`} });
    const stockData = await stockRes.json();
    const stocks    = Array.isArray(stockData) ? stockData : (stockData.data || []);
    const merged    = { ...article, ...(stocks[0]||{}), descripcion: article.descripcion||article.DESCRIPCION };

    appState.searching = false; appState.result = merged; appState.selectedDeposit = depositCode;
    history.push({ barcode, result: merged, error: null });
  } catch(e) {
    appState.searching = false; appState.error = e.message;
    history.push({ barcode, result: null, error: e.message });
  }
  render(appState);
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
const appState = {
  connected:false, connecting:false, authError:null,
  user:'MAXIMG', pass:'MAXIMG',
  barcode:'', searching:false,
  result:null, error:null, selectedDeposit:''
};
render(appState);
doConnect('MAXIMG','MAXIMG');
</script>
